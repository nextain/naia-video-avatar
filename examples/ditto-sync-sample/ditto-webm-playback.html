<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ditto WebM Sync Sample</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #15171a;
        color: #f3f4f6;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 520px);
      }

      video {
        width: 100%;
        aspect-ratio: 9 / 16;
        background: #000;
      }

      p {
        margin: 12px 0 0;
        font-size: 14px;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <video id="sample" controls playsinline src="./video/osarang-ko-sync-pattern-aligned.webm"></video>
      <p>free/local TTS wav -> Ditto -> WebM playback sample</p>
    </main>
    <script>
      window.sampleReady = new Promise((resolve, reject) => {
        const video = document.getElementById("sample");
        video.addEventListener("loadeddata", () => resolve({
          duration: video.duration,
          videoWidth: video.videoWidth,
          videoHeight: video.videoHeight,
        }), { once: true });
        video.addEventListener("error", () => reject(video.error), { once: true });
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>나이아 비디오 아바타 — nva 시나리오 데모</title>
<style>
  :root{ color-scheme:dark; }
  body{ margin:0; background:#0b0f16; color:#e6edf3; font-family:system-ui,sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
  h1{ font-size:18px; margin:18px 0 4px; } .sub{ color:#8b98a9; font-size:13px; margin:0 0 14px; }
  #wrap{ position:relative; width:360px; max-width:100vw; }
  video{ width:100%; height:640px; max-height:72vh; object-fit:cover; border-radius:14px; background:#000; display:block; box-shadow:0 10px 40px #0009; }
  #cap{ position:absolute; bottom:18px; left:8px; right:8px; text-align:center; pointer-events:none; }
  #cap span{ background:rgba(0,0,0,.66); padding:9px 15px; border-radius:9px; font-size:17px; font-weight:700; line-height:1.5; }
  #scn{ margin:18px; display:flex; gap:9px; flex-wrap:wrap; justify-content:center; max-width:560px; }
  #scn button{ background:#2f6feb; color:#fff; border:0; border-radius:9px; padding:11px 18px; font-size:15px; cursor:pointer; }
  #scn button:hover{ background:#3b78f5; } #scn button:disabled{ opacity:.5; cursor:default; }
  #hint{ color:#8b98a9; font-size:13px; } #st{ color:#5d6b7d; font-size:12px; margin-top:10px; }
  .badge{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
</style>
</head>
<body>
  <h1>나이아 비디오 아바타</h1>
  <p class="sub">nva 시나리오 → 캐스케이드 실시간 렌더 데모</p>
  <div id="wrap"><video id="av" playsinline muted></video><div id="cap"></div></div>
  <div id="scn"></div>
  <div id="hint">버튼을 누르면 nva 시나리오대로 안내합니다</div>
  <div id="st"><span class="badge" style="background:#e0a93a"></span>연결 확인 중…</div>

<script type="module">
import { NvaCascadeRenderer, probeCascade } from "./nva-cascade-adapter.js";
const qs = new URLSearchParams(location.search);
const NVA = (qs.get("nva") || "../../examples/demo.nva").replace(/\/$/, "");
const CAS = qs.get("cascade") || "/avatar";
const av = document.getElementById("av"), cap = document.getElementById("cap"), st = document.getElementById("st"), scn = document.getElementById("scn");
let M = null, R = null, playing = false;
const sleep = ms => new Promise(r => setTimeout(r, ms));
const caption = t => { cap.innerHTML = t ? `<span>${t}</span>` : ""; };
const setIdle = () => { av.src = `${CAS}/idle`; av.loop = true; av.muted = true; av.play().catch(() => {}); };

async function load() {
  try { M = await (await fetch(`${NVA}/manifest.json`)).json(); }
  catch (e) { st.textContent = "nva 로드 실패: " + e.message; return; }
  R = new NvaCascadeRenderer(CAS, av);
  const h = await probeCascade(CAS);
  st.innerHTML = h.ok
    ? `<span class="badge" style="background:#27c08a"></span>캐스케이드 연결됨 — 실시간 렌더`
    : `<span class="badge" style="background:#ff5a5a"></span>캐스케이드 미연결 (GPU 확인 필요) — 자막만 표시`;
  setIdle();
  for (const [id, s] of Object.entries(M.scenarios || {})) {
    const b = document.createElement("button"); b.textContent = s.label; b.dataset.id = id;
    b.onclick = () => playScenario(id); scn.appendChild(b);
  }
}

async function playScenario(id) {
  if (playing) return; playing = true;
  scn.querySelectorAll("button").forEach(b => b.disabled = true);
  const sc = M.scenarios[id];
  for (const step of sc.steps) {
    if (step.say) {
      caption(step.say);
      av.muted = false; av.loop = false;
      try { await R.speakText(step.say); } catch { await sleep(step.dwell_ms || 1500); }
    } else {
      await sleep(step.dwell_ms || 1500);
    }
    await sleep(400);
  }
  caption(""); setIdle();
  scn.querySelectorAll("button").forEach(b => b.disabled = false);
  playing = false;
}

load();
</script>
</body>
</html>

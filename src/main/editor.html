  header h1{ font-size:15px; margin:0; } .pill{ background:#222c3a; border-radius:999px; padding:2px 8px; font-size:11px; }
  button{ background:#222c3a; color:#e6edf3; border:1px solid #33415a; border-radius:7px; padding:6px 11px; cursor:pointer; font-size:13px; }

  label.f{ display:block; font-size:11px; color:#8b98a9; margin:8px 0 3px; }
  #wrap{ display:flex; height:calc(100vh - 50px); }
  aside{ width:320px; overflow:auto; padding:12px; } #struct{ border-right:1px solid #222c3a; } #form{ border-left:1px solid #222c3a; }
  main{ flex:1; display:flex; flex-direction:column; align-items:center; padding:14px; overflow:auto; }
  #player{ width:340px; max-width:92%; }
  canvas{ background:#000; border-radius:10px; width:100%; height:auto; display:block; }
  h2{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#8b98a9; margin:14px 0 6px; display:flex; justify-content:space-between; align-items:center; }
  .item{ display:flex; justify-content:space-between; align-items:center; padding:5px 8px; border-radius:6px; cursor:pointer; font-size:13px; margin:2px 0; background:#161d28; }
  .item:hover{ background:#1d2735; } .item.sel{ background:#2f6feb; }
  .item .tag{ font-size:10px; color:#8b98a9; } .item.sel .tag{ color:#cfe0ff; }
  .kind-talking{ color:#27c08a; } .kind-idle{ color:#8fb8ff; } .kind-gesture{ color:#e0a93a; }
  .ctrls{ margin:8px 0; } .ctrls button{ margin:0 4px 4px 0; }
  #valid{ white-space:pre-wrap; font-family:ui-monospace,monospace; font-size:11px; background:#0c1118; border:1px solid #222c3a; border-radius:7px; padding:8px; width:100%; max-width:520px; max-height:110px; overflow:auto; }
  .dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; } .ok{ background:#27c08a; } .bad{ background:#ff5a5a; }
  .muted{ color:#8b98a9; font-size:11px; }
  #status{ font-size:12px; color:#8b98a9; }
  #guide{ position:fixed; inset:0; background:rgba(0,0,0,.72); display:none; z-index:50; align-items:center; justify-content:center; }
  #guide.on{ display:flex; }
  #guide .box{ background:#11151c; border:1px solid #33415a; border-radius:12px; max-width:620px; max-height:82vh; overflow:auto; padding:22px 26px; line-height:1.6; }
  #guide h3{ margin:0 0 10px; font-size:17px; } #guide h4{ margin:16px 0 4px; color:#8fb8ff; font-size:13px; }
  #guide code{ background:#0c1118; padding:1px 6px; border-radius:4px; } #guide .close{ float:right; } #guide .tag{ color:#8b98a9; font-size:12px; }
#struct h2{ border-top:1px solid #2c3a48; padding-top:12px; margin-top:14px; }

  <h4>Structure (single state)</h4>
  <b>Entry = idle (loop)</b> → idle loop when silent; prebuilt speech webm when speaking.
  <b>Speech/expression slots</b> = already generated webm clips. <b>Gesture (non-loop)</b> = AI-triggered expressions/gestures.
  <p class="muted">Pick a type among idle/speak/gesture. Poses/transitions/states (sit, lie) are a later version.</p>
  <h4>Usage</h4>
  <b>Osarang slot NVA</b> / <b>Open .nva</b> → inspect animations and VRM-style slots on the left → preview webm in the center player → test copy with free TTS on the right → <b>Export</b>.
  <h4>Background · Alpha</h4>
  Alpha (VP9 yuva420p webm) clips composite straight over the background. Check with the preview color.
  <h4>AI triggers</h4>
  The AI reads each animation's <b>label</b> and <b>description</b> and plays the one that fits the conversation. Labels must be unique.`,
};
let lang = localStorage.getItem("nva_lang") || "ko";
function t(key, vars){ let s = (I18N[lang] && I18N[lang][key]) || (I18N.ko[key]) || key;
  if(vars) for(const k in vars) s = s.split("{"+k+"}").join(vars[k]); return s; }
function applyI18n(){
  document.documentElement.lang = lang;
  document.title = t("doc.title");
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ el.placeholder = t(el.dataset.i18nPh); });
  $("langBtn").textContent = t("lang.toggle");
  $("struct").dataset.lockmsg = t("lockmsg");
  $("guideBody").innerHTML = GUIDE[lang] || GUIDE.ko;
  // 동적 영역 재렌더(현재 언어 반영)
  if(M){ renderStruct(); renderForm(); refresh(); initTtsVoices(); }
}

let M=null, baseUrl="", blobMap={}, selected=null, busy=false, currentLocale="ko-KR";
let speaking=false, current=null;
let soundOn=false;
const $=id=>document.getElementById(id);
const cv=$("cv"), ctx=cv.getContext("2d"), off=document.createElement("canvas"), octx=off.getContext("2d",{willReadFrequently:true});
const video=document.createElement("video"); video.muted=true; video.playsInline=true;
window.addEventListener("pointerdown", ()=>{ soundOn=true; video.muted=false; }, { once:true });
const clipUrl=c=> blobMap[c]?.url || (baseUrl ? `${baseUrl}/${c}` : c);
function hexRGB(h){ h=(h||"#00b140").replace("#",""); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }

// ── 미리보기 합성 ──
function compose(ts){
  const bg=M?.background;
  const preview=(bg?.type==="color" && bg?.color) ? bg.color : (($("m_bg")&&$("m_bg").value) || "#fff2d6");
  ctx.fillStyle=preview; ctx.fillRect(0,0,cv.width,cv.height);
  if(video.readyState>=2){
    if(M?.chroma_key){
      off.width=cv.width; off.height=cv.height; octx.clearRect(0,0,cv.width,cv.height); octx.drawImage(video,0,0,cv.width,cv.height);
      const [cr,cg,cb]=hexRGB(M.chroma_key), img=octx.getImageData(0,0,cv.width,cv.height),d=img.data;
      for(let i=0;i<d.length;i+=4){ const dr=d[i]-cr,dg=d[i+1]-cg,db=d[i+2]-cb; if(dr*dr+dg*dg+db*db<90*90) d[i+3]=0; }
      octx.putImageData(img,0,0); ctx.drawImage(off,0,0);
    } else { ctx.drawImage(video,0,0,cv.width,cv.height); }
  }
  requestAnimationFrame(compose);
}
function playClip(clip,loop){ video.muted=!soundOn; video.src=clipUrl(clip); video.loop=loop; video.play().catch(()=>{}); }
function goto(key){ const a=M?.animations?.[key]; if(!a||busy) return; busy=true;
  current={key,clip:a.clip,loop:!!a.loop,can_talk:!!a.can_talk,face_bbox:a.face_bbox||null};
  playClip(a.clip, !!a.loop); busy=false; }

// ── 좌측 구조 + 플레이 버튼 ──
function renderStruct(){
  $("m_name").value=M.meta?.name||""; $("m_owner").value=M.meta?.owner||M.meta?.author||"";
  $("m_bgtype").value=M.background?.type||"transparent";
  $("m_bg").value=(M.background?.color)||"#fff2d6"; $("m_chroma").value=M.chroma_key||"#00b140";
  const al=$("animList"); al.innerHTML="";
  for(const[k,a]of Object.entries(M.animations||{})) al.appendChild(itemRow(k,animKind(a)));
  const pc=$("playCtrls"); pc.innerHTML="";
  for(const[k,a]of Object.entries(M.animations||{})){ const b=document.createElement("button"); b.className="sm"; b.textContent=a.label||k; b.onclick=()=>goto(k); pc.appendChild(b); }
  renderVrmSlots();
}
function renderVrmSlots(){
  const el=$("vrmSlots"); if(!el) return;
  const s=M?.vrm_slots;
  if(!s){ el.innerHTML=`<p>${t("vrm.empty")}</p>`; return; }
  const entries = [
    ["expression", s.expressions || {}],
    ["viseme", s.visemes || {}],
    ["motion", s.motions || {}],
    ["speech", s.speech || {}],
  ];
  el.innerHTML =
    `<p>${t("vrm.summary",{e:Object.keys(s.expressions||{}).length,v:Object.keys(s.visemes||{}).length,m:Object.keys(s.motions||{}).length,s:Object.keys(s.speech||{}).length})}</p>`+
    `<p><code>${t("vrm.llm")}</code></p>`+
    entries.map(([name,obj])=>`<div style="margin:8px 0"><b style="color:#cfe3ff">${name}</b><br>`+
      Object.keys(obj).slice(0,10).map(k=>`<button class="sm" data-vrm="${name}:${k}" style="margin:3px 3px 0 0">${k}</button>`).join("")+
      (Object.keys(obj).length>10?` <span>…</span>`:"")+
      `</div>`).join("");
  el.querySelectorAll("[data-vrm]").forEach(btn=>btn.onclick=()=>{
    const [kind,key]=btn.dataset.vrm.split(":");
    const slot = s[kind==="expression"?"expressions":kind==="viseme"?"visemes":kind==="motion"?"motions":"speech"]?.[key];
    const anim = slot?.animation || (kind==="motion" ? key : null);
    const clip = kind==="speech" ? localizedSpeech(slot).clip : slot?.clip;
    if(anim && M.animations?.[anim]) goto(anim);
    else if(clip) playClip(clip,false);
  });
}
function itemRow(key,tag){ const d=document.createElement("div"); d.className="item"+(selected===key?" sel":"");
  const del = tag==="gesture" ? `<button class="sm" data-del title="${t("btn.del")}" style="padding:0 6px;margin-left:6px;background:#3a2530;border-color:#5a3542;color:#e6a">✕</button>` : "";
  d.innerHTML=`<span>${key}</span><span style="display:flex;align-items:center;gap:2px"><span class="tag kind-${tag}">${tag}</span>${del}</span>`;
  d.onclick=()=>select(key);
  const db=d.querySelector("[data-del]"); if(db) db.onclick=e=>{ e.stopPropagation();
    if(confirm(t("confirm.del",{key}))){ delete M.animations[key]; if(selected===key) selected=null; renderForm(); refresh(); } };
  return d; }
function select(key){ selected=key; renderStruct(); renderForm(); goto(key); }

// ── 우측 편집 폼 (animation 전용) ──
function renderForm(){
  const fb=$("formBody"); if(!selected||!M.animations[selected]){ fb.innerHTML=`<p class="muted">${t("form.empty")}</p>`; return; }
  const a=M.animations[selected];
  // 순서: 클립 · 종류(idle/talking/gesture) · 라벨 · 설명. 발화는 미리 만든 webm 클립을 그대로 재생한다.
  fb.innerHTML=`<h2>${selected} <span class="tag kind-${animKind(a)}">${animKind(a)}</span></h2>`+
    fClip(a.clip)+
    fType(a)+
    fInp("label",t("form.label"),a.label)+
    fArea("description",t("form.desc"),a.description);
  bindForm(v=>Object.assign(a,v));
  const ts=fb.querySelector("[data-type]");   // 종류 변경 → loop/can_talk 설정 + 재렌더(머리영역 노출 갱신)
  if(ts) ts.onchange=()=>{ const v=ts.value; a.loop=(v!=="gesture"); a.can_talk=(v==="talking"); renderForm(); refresh(); };
}
const esc=v=>String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
const fInp=(k,l,v)=>`<label class="f">${l}</label><input data-k="${k}" value="${esc(v)}">`;
const fArea=(k,l,v)=>`<label class="f">${l}</label><textarea data-k="${k}" rows="2" style="width:100%;box-sizing:border-box;font:inherit;padding:4px">${esc(v)}</textarea>`;
const fClip=(v)=>`<label class="f">${t("form.clip")}</label><input data-k="clip" value="${esc(v)}"><input type="file" accept="video/*,.webm" data-clip="clip" style="font-size:11px;margin-top:3px">`;
const fType=(a)=>{ const k=a.can_talk?"talking":(a.loop?"idle":"gesture");
  return `<label class="f">${t("form.type")}</label><select data-type>${[["idle","form.type.idle"],["talking","form.type.talking"],["gesture","form.type.gesture"]].map(([v,lk])=>`<option value="${v}" ${k===v?"selected":""}>${t(lk)}</option>`).join("")}</select>`; };
function bindForm(apply){
  $("formBody").querySelectorAll("[data-k]").forEach(el=>el.onchange=()=>{ const k=el.dataset.k, v=el.type==="checkbox"?el.checked:el.value; apply({[k]:v}); refresh(); });
  $("formBody").querySelectorAll("[data-clip]").forEach(el=>el.onchange=()=>{
    const f=el.files[0]; if(!f)return; const name="clips/"+f.name; blobMap[name]={url:URL.createObjectURL(f),blob:f}; apply({[el.dataset.clip]:name}); refresh();
    if(current&&current.key===selected){ busy=false; current=null; goto(selected); } });   // 새 클립 즉시 플레이어 재생
}

// ── 갱신 ──
function refresh(){
  const r=validateManifest(M);
  $("valid").textContent=(r.ok?t("valid.valid")+"\n":t("valid.invalid")+"\n")+r.errors.map(e=>t("valid.err")+e).join("\n")+(r.errors.length?"\n":"")+r.warnings.map(w=>t("valid.warn")+w).join("\n")+(r.warnings.length?"":t("valid.noWarn"));
  $("vdot").className="dot "+(r.ok?"ok":"bad");
  cv.width=M.canvas?.width||360; cv.height=M.canvas?.height||640;
  renderStruct();
}

// 메타 입력
$("m_name").onchange=e=>{ (M.meta=M.meta||{}).name=e.target.value; refresh(); };
$("m_owner").onchange=e=>{ (M.meta=M.meta||{}).owner=e.target.value; M.meta.author=e.target.value; refresh(); };
$("m_bgtype").onchange=e=>{ (M.background=M.background||{}).type=e.target.value; if(e.target.value==="color"&&!M.background.color) M.background.color=$("m_bg").value; refresh(); };
$("m_bg").onchange=e=>{ (M.background=M.background||{type:"color"}).color=e.target.value; };
$("m_chroma").onchange=e=>{ M.chroma_key=e.target.value; };
$("m_chroma_clr").onclick=()=>{ delete M.chroma_key; refresh(); };

// 기본 2개(대기 idle + 말하기 speak) 보장 — 로드/신규 시 없으면 생성
function ensureBase(){
  M.animations = M.animations || {};
  const has = pred => Object.values(M.animations).some(a=>pred(a));
  if(!has(a=>a.loop && !a.can_talk)) M.animations = { idle:{clip:"",loop:true,can_talk:false,label:t("seed.idle")}, ...M.animations };
  if(!has(a=>a.loop &&  a.can_talk)) M.animations = { ...M.animations, speak:{clip:"",loop:true,can_talk:true,face_bbox:[0.11,0.10,0.78,0.46],label:t("seed.speak")} };
}
$("addAnim").onclick=()=>{ let n=1; while(M.animations["gesture-"+n]) n++; const k="gesture-"+n;
  M.animations[k]={clip:"",loop:false,can_talk:false,label:t("seed.gesture",{n}),description:""}; select(k); refresh(); };

// 로드 / 내보내기
async function loadManifest(m,base){ M=migrateToV02(m); ensureBase(); baseUrl=base||""; selected=null; syncLocaleOptions(); renderForm(); refresh(); syncTtsText();
  const idle=Object.keys(M.animations||{}).find(k=>M.animations[k].loop&&!M.animations[k].can_talk)||Object.keys(M.animations||{})[0]; if(idle) goto(idle); }
async function loadNaiaBundle(){ const base="../../examples/naia-prebaked.nva"; const m=await (await fetch(`${base}/manifest.json`)).json(); blobMap={}; loadManifest(m,base); $("status").textContent=t("status.loadNaia"); }
$("loadNaia").onclick=loadNaiaBundle;
$("loadOsarang").onclick=async()=>{ const base="../../examples/osarang-prebaked.nva"; const m=await (await fetch(`${base}/manifest.json`)).json(); blobMap={}; loadManifest(m,base); $("status").textContent=t("status.loadOsarang"); };
$("loadDemo").onclick=async()=>{ const base="../../examples/demo.nva"; const m=await (await fetch(`${base}/manifest.json`)).json(); blobMap={}; loadManifest(m,base); $("status").textContent=t("status.loadDemo"); };
$("openNva").onchange=async e=>{ const f=e.target.files[0]; if(!f)return; const zip=await JSZip.loadAsync(f);
  const mf=await zip.file("manifest.json").async("string"); blobMap={}; baseUrl="";
  for(const [path,zf] of Object.entries(zip.files)){ if(/\.(webm|mp4|jpg|png|wav)$/.test(path)){ const blob=await zf.async("blob"); blobMap[path]={url:URL.createObjectURL(blob),blob}; } }
  loadManifest(JSON.parse(mf),""); $("status").textContent=t("status.opened",{name:f.name}); };
// nva(manifest + clips)를 zip blob 으로 내보내기.
async function buildNvaZip(){
  const r=validateManifest(M); if(!r.ok) throw new Error(t("err.validation",{errs:r.errors.join("\n")}));
  const zip=new JSZip(); zip.file("manifest.json", JSON.stringify(M,null,2));
  const clips=new Set(Object.values(M.animations||{}).map(a=>a.clip).filter(Boolean));
  for(const a of Object.values(M.animations||{})){
    if(a.head_image) clips.add(a.head_image);
    if(a.expression_image) clips.add(a.expression_image);
  }
  const addSlotAsset=o=>{ if(!o||typeof o!=="object") return; for(const v of Object.values(o)){ if(v?.clip) clips.add(v.clip); if(v?.audio) clips.add(v.audio); if(v?.image) clips.add(v.image); if(v?.preview_image) clips.add(v.preview_image); if(v?.expression_image) clips.add(v.expression_image); if(v?.by_locale) addSlotAsset(v.by_locale); } };
  addSlotAsset(M.vrm_slots?.expressions); addSlotAsset(M.vrm_slots?.visemes); addSlotAsset(M.vrm_slots?.motions); addSlotAsset(M.vrm_slots?.speech);
  addSlotAsset(M.expression_states); addSlotAsset(M.viseme_clips); addSlotAsset(M.prebaked_speech?.utterances);
  for(const c of clips){ try{ if(blobMap[c]) zip.file(c,blobMap[c].blob); else if(baseUrl){ const b=await (await fetch(`${baseUrl}/${c}`)).blob(); zip.file(c,b); } }catch(e){} }
  return await zip.generateAsync({type:"blob"});
}
$("exportBtn").onclick=async()=>{
  if(!M){ alert(t("alert.loadFirst")); return; }
  try{ const out=await buildNvaZip(); const a=document.createElement("a"); a.href=URL.createObjectURL(out); a.download=(M.meta?.name||"character")+".nva"; a.click(); $("status").textContent=t("status.exported"); }
  catch(e){ alert(t("alert.exportBlocked",{msg:e.message})); }
};

// 무료 TTS 테스트. 브라우저 내장 음성만 사용하며 NVA 번들에는 저장하지 않는다.
function availableLocales(){
  const p=M?.vrm_slots?.profile || {};
  return p.available_locales || p.locales || Object.keys(Object.values(M?.vrm_slots?.speech || {})[0]?.by_locale || {}) || [p.default_locale || "ko-KR"];
}
function syncLocaleOptions(){
  const sel=$("localeSelect");
  if(!sel) return;
  const locales=availableLocales();
  const preferred = M?.vrm_slots?.profile?.default_locale || currentLocale || locales[0] || "ko-KR";
  currentLocale = locales.includes(preferred) ? preferred : (locales[0] || preferred);
  sel.innerHTML=locales.map(locale=>`<option value="${esc(locale)}">${esc(locale)}</option>`).join("");
  sel.value=currentLocale;
}
function localizedSpeech(slot){
  if(!slot) return {};
  return slot.by_locale?.[currentLocale] || slot.by_locale?.[M?.vrm_slots?.profile?.default_locale] || slot;
}
function preferredSpeechText(){
  const first = localizedSpeech(Object.values(M?.vrm_slots?.speech || {})[0])?.text;
  return first || $("ttsText")?.value || t("tts.placeholder");
}
function syncTtsText(){
  const tx=$("ttsText");
  if(tx && !tx.dataset.userEdited) tx.value=preferredSpeechText();
}
function initTtsVoices(){
  const sel=$("ttsVoice"), st=$("ttsStatus");
  if(!sel || !st) return;
  if(!("speechSynthesis" in window)){
    sel.innerHTML="";
    st.textContent=t("tts.unsupported");
    $("ttsSpeak").disabled=true;
    $("ttsStop").disabled=true;
    return;
  }
  const voices=window.speechSynthesis.getVoices();
  sel.innerHTML=voices.map((v,i)=>`<option value="${esc(v.voiceURI)}">${esc(v.name)} · ${esc(v.lang)}${v.default?" · default":""}</option>`).join("");
  const exact=voices.find(v=>v.lang===currentLocale);
  const sameLang=voices.find(v=>v.lang?.slice(0,2)===currentLocale.slice(0,2));
  if(exact || sameLang) sel.value=(exact || sameLang).voiceURI;
  st.textContent=voices.length?t("tts.ready",{n:voices.length}):t("tts.empty");
}
function speakTts(){
  if(!("speechSynthesis" in window)){ $("ttsStatus").textContent=t("tts.unsupported"); return; }
  const text=($("ttsText").value||"").trim();
  if(!text) return;
  const u=new SpeechSynthesisUtterance(text);
  const voices=window.speechSynthesis.getVoices();
  const picked=voices.find(v=>v.voiceURI===$("ttsVoice").value);
  if(picked){ u.voice=picked; u.lang=picked.lang; }
  else u.lang=currentLocale || (lang==="ko" ? "ko-KR" : "en-US");
  u.onstart=()=>{ speaking=true; $("ttsStatus").textContent=t("tts.playing"); };
  u.onend=()=>{ speaking=false; $("ttsStatus").textContent=t("tts.done"); };
  u.onerror=()=>{ speaking=false; $("ttsStatus").textContent=t("tts.done"); };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
function stopTts(){
  if("speechSynthesis" in window) window.speechSynthesis.cancel();
  speaking=false;
  $("ttsStatus").textContent=t("tts.stopped");
}
$("ttsText").oninput=()=>{ $("ttsText").dataset.userEdited="1"; };
$("localeSelect").onchange=()=>{ currentLocale=$("localeSelect").value; delete $("ttsText").dataset.userEdited; syncTtsText(); initTtsVoices(); };
$("ttsSpeak").onclick=speakTts;
$("ttsStop").onclick=stopTts;
if("speechSynthesis" in window) window.speechSynthesis.onvoiceschanged=initTtsVoices;
initTtsVoices();

$("helpBtn").onclick=()=>$("guide").classList.add("on");
$("guideClose").onclick=()=>$("guide").classList.remove("on");
$("guide").onclick=e=>{ if(e.target.id==="guide") $("guide").classList.remove("on"); };
$("langBtn").onclick=()=>{ lang = (lang==="ko") ? "en" : "ko"; localStorage.setItem("nva_lang", lang); applyI18n(); };

const _bt=$("buildTag"); if(_bt) _bt.textContent="build "+BUILD;   // 캐시 확인용 — 헤더에 현재 빌드 표시
applyI18n();
requestAnimationFrame(compose);
loadNaiaBundle();
</script>
